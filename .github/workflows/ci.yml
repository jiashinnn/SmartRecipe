name: SmartRecipe CI / Build Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run lint checks
      run: npm run lint

    - name: Run Next.js production build test
      run: npm run build
      env:
        # Mock environment variables so the Next.js compile step passes successfully
        NEXT_PUBLIC_SUPABASE_URL: "https://cnqbasnllhfqfcuwwhzf.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-anon-key"
        GROQ_API_KEY: "mock-groq-key"
